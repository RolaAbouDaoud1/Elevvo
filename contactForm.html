<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .contact-form{
            height: auto;
            width: 50%;
            box-shadow: 0 6px 15px rgba(78, 140, 117, 0.774);
            display: flex;
            flex-direction: column;
            background-color: rgb(151, 206, 151);
            margin: 3rem;
            border-radius: 10px;
            border-bottom-right-radius: 70%;
            transition: 0.3s ease-out;
            padding-bottom: 20px;
        }
        .contact-form:hover{
            border-bottom-right-radius: 50%;
        }
        .header{
            background-color: rgba(78, 140, 117, 0.774);
            border-radius: 100%;
            text-align: center;
            color:azure;
            font-style: oblique;
            transition: 1s ease-in-out;
        }
        .header:hover{
            color: rgb(220, 228, 230);
            scale: 1.01;
        }
        form{
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 1rem;
        }
        input, textarea{
            width: 60%;
            height: 2rem;
            border-radius: 10px;
            border: none;
            padding-left: 10px;
            box-shadow: 0 6px 15px rgba(78, 140, 117, 0.774);
        }
        .submit{
            background-color: #4CAF50; 
            color: white;            
            padding: 10px 20px;      
            border: none;             
            border-radius: 15px;       
            font-size: 16px;          
            cursor: pointer;  
            transition: all 1s ease-in-out;  
            height: 20%;       
        }
        .submit:hover{
            background-color:white;
            color: #4CAF50;
        }
       input:focus,textarea:focus{
            outline:#4CAF50;
       }
       label{
        color: white;
        font-weight: 900;
        font-style: oblique;
        text-decoration:underline;
        text-decoration-color: #4CAF50;
       }
       input::placeholder,textarea::placeholder{
        color: rgb(196, 194, 194);
       }
        #form span{
            color: red;
        }
    </style>
</head>
<body>
    <section class="contact-form" id="contact-form">
            <div class="header">
                <h1>Contact Form</h1>
            </div>
            <form id="form" action="#">
                <label for="full-name">Full Name</label>
                <input type="text" id="full-name" placeholder="Full Name" required>
                <span id="nameError" class="error"></span>

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Email" required>
                <span id="emailError" class="error"></span>
                
                <label for="subject">Subject</label>
                <input type="text" id="subject" placeholder="Subject" required>
                <span id="subjectError" class="error"></span>
                
                <label for="message">Message</label>
                <textarea name="message" id="message" placeholder="message..."></textarea>
                <span id="messageError" class="error"></span>
                
                <input type="submit" value="Submit" class="submit">
            </form>
    </section>
    <script>
        const form=document.getElementById('form');
        form.addEventListener("submit", function(e){
            e.preventDefault();

            let isValid=true;

            let name=document.getElementById('full-name').value.trim();
            let email=document.getElementById("email").value.trim();
            let subject=document.getElementById("subject").value.trim();
            let message=document.getElementById("message").value.trim();

            document.getElementById("nameError").innerText = "";
            document.getElementById("emailError").innerText = "";
            document.getElementById("subjectError").innerText = "";
            document.getElementById("messageError").innerText = "";

            if(name.length<3){
                document.getElementById("nameError").innerHTML="Full name must be at leat 3 characters.";
                isValid=false;
            }

            //if no @ or . found then the email is not valid
            if(email.indexOf("@") === -1 || email.indexOf(".") === -1){
                document.getElementById("emailError").innerText = "Please enter a valid email.";
            } else {
                document.getElementById("emailError").innerText = "";
            }

            if(subject === ""){
                document.getElementById("subjectError").innerText = "Subject cannot be empty.";
                isValid = false;
            }

             if(message.length!=0 && message.length < 10){
                document.getElementById("messageError").innerText = "Message must be at least 10 characters.";
                isValid = false;
            }

            if(isValid){
                alert("Form submitted successfully!");
                document.getElementById("form").reset();
            }
        })
    </script>
</body>
</html>
